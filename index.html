<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>DreamByte Share</title>

    <link rel="stylesheet" href="css/style.css">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background:#0f1117;
            color:white;
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            overflow:hidden;
        }

        .background{
            position:absolute;
            width:100%;
            height:100%;
            background:
            radial-gradient(circle at top left,#6c63ff33,transparent 30%),
            radial-gradient(circle at bottom right,#00d4ff22,transparent 30%);
            z-index:-1;
        }

        .container{
            background:rgba(255,255,255,0.05);
            border:1px solid rgba(255,255,255,0.1);
            backdrop-filter:blur(12px);

            padding:40px;
            border-radius:20px;

            width:90%;
            max-width:500px;

            text-align:center;

            box-shadow:0 0 25px rgba(0,0,0,0.4);
        }

        h1{
            font-size:3rem;
            margin-bottom:10px;
        }

        p{
            color:#bdbdbd;
            margin-bottom:30px;
        }

        .buttons{
            display:flex;
            flex-direction:column;
            gap:15px;
        }

        button{
            padding:15px;
            border:none;
            border-radius:12px;

            background:#6c63ff;
            color:white;

            font-size:1rem;
            cursor:pointer;

            transition:0.2s;
        }

        button:hover{
            transform:scale(1.03);
            background:#7d75ff;
        }

        .secondary{
            background:#1f2430;
        }

        .secondary:hover{
            background:#2b3140;
        }

        footer{
            margin-top:25px;
            font-size:0.8rem;
            color:#777;
        }
    </style>
</head>

<body>

<div class="background"></div>

<div class="container">

    <h1>DreamByte Share</h1>

    <p>
        Comparte proyectos, mods, archivos y creaciones con la comunidad DreamByte.
    </p>

    <div class="buttons">

        <button onclick="location.href='upload.html'">
            📤 Subir archivo
        </button>

        <button class="secondary" onclick="location.href='explore.html'">
            🔎 Explorar archivos
        </button>

        <button class="secondary" onclick="location.href='login.html'">
            👤 Iniciar sesión
        </button>

    </div>

    <footer>
        DreamByte Studios © 2026
    </footer>

</div>

</body>
</html>
